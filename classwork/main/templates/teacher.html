{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Квант</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Advent+Pro:ital,wght@0,100..900;1,100..900&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <h1>Описание учителя {{ teacher.name }}:</h1>
    <img src="{% static teacher.image %}" width="250px">
    <h2>{{ teacher.name }}</h2>
    <ul>
        <li><p>Лет: {{ teacher.age }}</p></li>
        <li><p>Направление: {{ teacher.course }}</p></li>
    </ul>
</body>
</html>
